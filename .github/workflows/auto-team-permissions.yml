name: Auto Assign Team Permissions

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Repo adi (bos birakilirsa tum repolara uygulanir)"
        required: false

jobs:
  set-team-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repo
        uses: actions/checkout@v4

      - name: Yetki ata ve .gitignore ekle
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          ORG="AundeTeknik-Org"

          if [ -n "${{ github.event.inputs.repo_name }}" ]; then
            REPOS="${{ github.event.inputs.repo_name }}"
          else
            REPOS=$(gh repo list $ORG --json name --jq '.[].name')
          fi

          for REPO in $REPOS; do
            echo "--- $REPO ---"

            # Developer team -> write
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/$ORG/teams/developer/repos/$ORG/$REPO" \
              -d '{"permission":"push"}'
            echo "Developer -> write"

            # Viewer team -> read
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/orgs/$ORG/teams/viewer/repos/$ORG/$REPO" \
              -d '{"permission":"pull"}'
            echo "Viewer -> read"

            # .gitignore ekle (sadece yoksa)
            EXISTING=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$ORG/$REPO/contents/.gitignore")

            if [ "$EXISTING" = "404" ]; then
              CONTENT=$(base64 -w 0 templates/.gitignore)
              curl -s -X PUT \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$ORG/$REPO/contents/.gitignore" \
                -d "{\"message\":\"chore: add .gitignore\",\"content\":\"$CONTENT\"}"
              echo ".gitignore eklendi"
            else
              echo ".gitignore zaten mevcut, atlanıyor"
            fi
          done
